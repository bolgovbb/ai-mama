name: Маша Соколова — автопубликация статей

# 6 статей в день: 3 агента × 2 раза (утро + день)
on:
  schedule:
    # Утренний выпуск — 09:00 МСК = 06:00 UTC
    - cron: '0 6 * * *'    # morning
    # Дневной выпуск — 15:00 МСК = 12:00 UTC
    - cron: '0 12 * * *'   # afternoon

  workflow_dispatch:
    inputs:
      agent:
        description: 'Агент (motherhood / parenting / health / all)'
        required: true
        default: 'all'
        type: choice
        options:
          - motherhood
          - parenting
          - health
          - all
      topic:
        description: 'Своя тема (опционально)'
        required: false
        type: string
      rewrite:
        description: 'Перезаписать все статьи агента (true/false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
          - 'generate-covers'

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
  PLATFORM_KEY_MOTHERHOOD: ${{ secrets.PLATFORM_KEY_MOTHERHOOD }}
  PLATFORM_KEY_PARENTING: ${{ secrets.PLATFORM_KEY_PARENTING }}
  PLATFORM_KEY_HEALTH: ${{ secrets.PLATFORM_KEY_HEALTH }}
  PLATFORM_AGENT_ID_MOTHERHOOD: ${{ secrets.PLATFORM_AGENT_ID_MOTHERHOOD }}
  PLATFORM_AGENT_ID_PARENTING: ${{ secrets.PLATFORM_AGENT_ID_PARENTING }}
  PLATFORM_AGENT_ID_HEALTH: ${{ secrets.PLATFORM_AGENT_ID_HEALTH }}
  PLATFORM_SLUG_MOTHERHOOD: ${{ secrets.PLATFORM_SLUG_MOTHERHOOD }}
  PLATFORM_SLUG_PARENTING: ${{ secrets.PLATFORM_SLUG_PARENTING }}
  PLATFORM_SLUG_HEALTH: ${{ secrets.PLATFORM_SLUG_HEALTH }}
  CLAUDE_ENVIRONMENT_ID: ${{ secrets.CLAUDE_ENVIRONMENT_ID }}
  CLAUDE_AGENT_ID_MOTHERHOOD: ${{ secrets.CLAUDE_AGENT_ID_MOTHERHOOD }}
  CLAUDE_AGENT_ID_PARENTING: ${{ secrets.CLAUDE_AGENT_ID_PARENTING }}
  CLAUDE_AGENT_ID_HEALTH: ${{ secrets.CLAUDE_AGENT_ID_HEALTH }}
  PLATFORM_KEY_EDITOR: ${{ secrets.PLATFORM_KEY_EDITOR }}
  PLATFORM_AGENT_ID_EDITOR: ${{ secrets.PLATFORM_AGENT_ID_EDITOR }}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Scheduled: все 3 агента каждый запуск ──
      - name: Run all agents
        if: github.event_name == 'schedule'
        run: python deploy_agents.py --run all

      # ── Manual runs ────────────────────────────
      - name: Run manual (with optional topic)
        if: github.event_name == 'workflow_dispatch'
        run: |
          AGENT="${{ inputs.agent }}"
          TOPIC="${{ inputs.topic }}"
          REWRITE="${{ inputs.rewrite }}"
          if [ "$REWRITE" = "generate-covers" ]; then
            python deploy_agents.py --generate-covers
          elif [ "$REWRITE" = "true" ]; then
            python deploy_agents.py --rewrite-all "$AGENT"
          elif [ -n "$TOPIC" ] && [ "$AGENT" != "all" ]; then
            python deploy_agents.py --topic "$AGENT" "$TOPIC"
          else
            python deploy_agents.py --run "$AGENT"
          fi
