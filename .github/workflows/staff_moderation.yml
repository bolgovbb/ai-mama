name: Staff модерация — Редактор + Модератор

on:
  schedule:
    # Полный цикл: каждые 3 часа (08, 11, 14, 17, 20 МСК)
    - cron: '0 5,8,11,14,17 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Действие'
        required: true
        default: 'full-cycle'
        type: choice
        options:
          - full-cycle
          - editor
          - moderator
          - revisions
          - setup-staff

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
  CLAUDE_ENVIRONMENT_ID: ${{ secrets.CLAUDE_ENVIRONMENT_ID }}
  PLATFORM_KEY_EDITOR: ${{ secrets.PLATFORM_KEY_EDITOR }}
  PLATFORM_KEY_MODERATOR: ${{ secrets.PLATFORM_KEY_MODERATOR }}
  PLATFORM_AGENT_ID_EDITOR: ${{ secrets.PLATFORM_AGENT_ID_EDITOR }}
  PLATFORM_AGENT_ID_MODERATOR: ${{ secrets.PLATFORM_AGENT_ID_MODERATOR }}
  CLAUDE_AGENT_ID_EDITOR: ${{ secrets.CLAUDE_AGENT_ID_EDITOR }}
  CLAUDE_AGENT_ID_MODERATOR: ${{ secrets.CLAUDE_AGENT_ID_MODERATOR }}
  PLATFORM_KEY_MOTHERHOOD: ${{ secrets.PLATFORM_KEY_MOTHERHOOD }}
  PLATFORM_KEY_PARENTING: ${{ secrets.PLATFORM_KEY_PARENTING }}
  PLATFORM_KEY_HEALTH: ${{ secrets.PLATFORM_KEY_HEALTH }}
  CLAUDE_AGENT_ID_MOTHERHOOD: ${{ secrets.CLAUDE_AGENT_ID_MOTHERHOOD }}
  CLAUDE_AGENT_ID_PARENTING: ${{ secrets.CLAUDE_AGENT_ID_PARENTING }}
  CLAUDE_AGENT_ID_HEALTH: ${{ secrets.CLAUDE_AGENT_ID_HEALTH }}

jobs:
  # Полный цикл: editor → revisions → editor (повторная проверка)
  full-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || inputs.action == 'full-cycle'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: "Step 1: Editor — проверка статей в review"
        run: python deploy_agents.py --run-editor

      - name: "Step 2: Revisions — авторы дорабатывают"
        run: python deploy_agents.py --run-revisions

      - name: "Step 3: Editor — повторная проверка доработанных"
        run: python deploy_agents.py --run-editor

      - name: "Step 4: Moderator — проверка комментариев"
        run: python deploy_agents.py --run-moderator

  # Отдельные jobs для ручного запуска
  editor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: inputs.action == 'editor'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - run: python deploy_agents.py --run-editor

  moderator:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: inputs.action == 'moderator'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - run: python deploy_agents.py --run-moderator

  revisions:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: inputs.action == 'revisions'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - run: python deploy_agents.py --run-revisions

  setup-staff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: inputs.action == 'setup-staff'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - run: python deploy_agents.py --setup-staff
