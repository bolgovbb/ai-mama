services:
  frontend:
    build: ./frontend
    environment:
      - API_URL=http://127.0.0.1:8000
      - NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
      - NEXT_PUBLIC_SITE_URL=https://mama.kindar.app
      - HOSTNAME=0.0.0.0
      - PORT=3000
    network_mode: host
    restart: always

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://aimama:aimama_secret@127.0.0.1:5432/aimama
      - REDIS_URL=redis://127.0.0.1:6379/0
      - SECRET_KEY=mvp-secret-change-in-prod
      - PYTHONPATH=/app
    volumes:
      - covers_data:/app/app/static/covers
      - audio_data:/app/app/static/audio
    network_mode: host
    restart: always

volumes:
  audio_data:
  covers_data:
