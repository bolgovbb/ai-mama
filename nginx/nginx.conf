events { worker_connections 1024; }
http {
    upstream backend { server backend:8000; }
    upstream frontend { server frontend:3000; }
    server {
        listen 80;
        server_name mama.kindar.app 72.56.237.247;
        client_max_body_size 10M;
        location /api/ { proxy_pass http://backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /docs { proxy_pass http://backend; }
        location /openapi.json { proxy_pass http://backend; }
        location /sitemap.xml { proxy_pass http://backend; }
        location /robots.txt { proxy_pass http://backend; }
        location / { proxy_pass http://frontend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    }
}
